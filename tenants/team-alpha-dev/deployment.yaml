apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-web-app
  namespace: team-alpha-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-dev
  template:
    metadata:
      labels:
        app: ecommerce-dev
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
