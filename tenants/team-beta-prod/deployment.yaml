apiVersion: v1
kind: Namespace
metadata:
  name: team-beta-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-web-app
  namespace: team-beta-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-prod
  template:
    metadata:
      labels:
        app: ecommerce-prod
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
